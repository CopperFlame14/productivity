<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ProQuest</title>
    <meta name="description" content="Your daily productivity dashboard with gamification.">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/leetcode-panel.css">
</head>

<body>
    <!-- App shell injected by app.js -->

    <!-- Page Header -->
    <div class="page-header">
        <h1>Good day! 👋</h1>
        <p>Complete your daily quests to earn XP, maintain your streak, and level up.</p>
    </div>

    <!-- Gamification Stats -->
    <div class="stats-grid stagger mb-4">
        <div class="card stat-card stat-card--primary fade-in-up">
            <span class="stat-icon">⭐</span>
            <div class="stat-label">Level</div>
            <div class="stat-value" id="level">1</div>
        </div>
        <div class="card stat-card stat-card--accent fade-in-up">
            <span class="stat-icon">✨</span>
            <div class="stat-label">Total XP</div>
            <div class="stat-value" id="xp">0</div>
        </div>
        <div class="card stat-card stat-card--warning fade-in-up">
            <span class="stat-icon">🔥</span>
            <div class="stat-label">Streak</div>
            <div class="stat-value" id="streak">0</div>
        </div>
        <div class="card stat-card stat-card--danger fade-in-up">
            <span class="stat-icon">❤️</span>
            <div class="stat-label">HP</div>
            <div class="stat-value" id="hp">100</div>
            <div class="health-meter mt-2" style="padding: 0 1rem;">
                <div class="health-bar-track">
                    <div class="health-bar-fill hp-high" id="health-bar-fill" style="width: 100%"></div>
                </div>
            </div>
        </div>
        <div class="card stat-card stat-card--highlight fade-in-up">
            <span class="stat-icon">📊</span>
            <div class="stat-label">Score</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="card stat-card fade-in-up">
            <span class="stat-icon">🏅</span>
            <div class="stat-label">Rank</div>
            <div class="stat-value">
                <span class="rank-badge rank-c" id="rank">C</span>
            </div>
        </div>
    </div>

    <!-- XP Progress Bar -->
    <div class="card mb-4 card-static fade-in-up">
        <div class="xp-bar-container">
            <div class="xp-bar-header">
                <span class="xp-bar-label">Progress to Next Level</span>
                <span class="xp-bar-value" id="xp-bar-value">0 / 500 XP</span>
            </div>
            <div class="xp-bar-track">
                <div class="xp-bar-fill" id="xp-bar-fill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Daily Tasks -->
    <div class="card fade-in-up card-static">
        <div class="card-header">
            <h2 class="card-title" style="margin:0;">🎯 Daily Quests</h2>
            <span class="badge badge-primary">+XP per task</span>
        </div>

        <!-- Workout -->
        <div class="task-item">
            <label class="checkbox-label">
                <input type="checkbox" id="task-workout">
                <span>💪 Workout <span class="caption">(20 min)</span></span>
            </label>
            <div class="task-inputs">
                <input type="number" id="workout-min" class="form-input" placeholder="Min" min="0">
                <input type="number" id="workout-bonus" class="form-input" placeholder="Bonus" min="0">
            </div>
        </div>

        <!-- LeetCode -->
        <div id="leetcode-container"></div>

        <!-- Project -->
        <div class="task-item">
            <label class="checkbox-label">
                <input type="checkbox" id="task-project">
                <span>💻 Project <span class="caption">(30 min)</span></span>
            </label>
            <div class="task-inputs">
                <input type="number" id="project-min" class="form-input" placeholder="Min" min="0">
                <input type="number" id="project-bonus" class="form-input" placeholder="Bonus" min="0">
            </div>
        </div>

        <!-- Study -->
        <div class="task-item">
            <label class="checkbox-label">
                <input type="checkbox" id="task-study">
                <span>📚 Study <span class="caption">(20 min)</span></span>
            </label>
            <div class="task-inputs">
                <input type="number" id="study-min" class="form-input" placeholder="Min" min="0">
                <input type="number" id="study-bonus" class="form-input" placeholder="Bonus" min="0">
            </div>
        </div>

        <!-- Water -->
        <div class="task-item">
            <label class="checkbox-label">
                <input type="checkbox" id="task-water">
                <span>💧 Drink Water <span class="caption">(8 glasses)</span></span>
            </label>
            <div class="task-inputs">
                <input type="number" id="water-glasses" class="form-input" placeholder="Glasses" min="0" max="20">
            </div>
        </div>

        <div class="d-flex gap-2 mt-3">
            <button id="save-btn" class="btn btn-primary">
                Save Progress
            </button>
            <button id="reset-btn" class="btn btn-secondary">
                Reset
            </button>
        </div>
    </div>

    <div id="message-container" class="mt-2"></div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/leetcode-panel.js"></script>
    <script src="/js/dashboard.js"></script>
</body>

</html>
