<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — ProQuest</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="page-header"><h1>Leaderboard</h1><p>Compete with others and climb the ranks. Top performers earn league promotions!</p></div>

    <div class="card mb-4 card-static fade-in-up">
        <div class="d-flex justify-between align-center flex-wrap gap-3">
            <div><div class="overline">Your League</div><div class="d-flex align-center gap-2 mt-1"><span class="lb-league league-silver">Silver League</span></div></div>
            <div class="text-center"><div class="overline">Your Rank</div><div style="font-size:2.5rem;font-weight:900;color:var(--primary-light);line-height:1.1">#5</div></div>
        </div>
    </div>

    <!-- Podium -->
    <div class="grid grid-3 mb-4 stagger">
        <div class="card stat-card fade-in-up text-center" style="margin-top:var(--sp-8)">
            <div class="lb-rank lb-rank--2" style="width:48px;height:48px;margin:0 auto var(--sp-3);font-size:1.25rem">2</div>
            <div class="lb-avatar" style="width:48px;height:48px;margin:0 auto var(--sp-3);font-size:0.875rem">SK</div>
            <div style="font-weight:600;color:var(--text-primary);margin-bottom:var(--sp-1)">Sarah K.</div>
            <div style="font-weight:700;color:var(--primary-light)">12,400 XP</div>
        </div>
        <div class="card stat-card fade-in-up text-center" style="border-color:rgba(255,215,0,0.2)">
            <div style="margin-bottom:var(--sp-2)"><i data-lucide="crown" style="width:32px;height:32px;color:#ffd700"></i></div>
            <div class="lb-rank lb-rank--1" style="width:56px;height:56px;margin:0 auto var(--sp-3);font-size:1.5rem">1</div>
            <div class="lb-avatar" style="width:56px;height:56px;margin:0 auto var(--sp-3);font-size:1rem;background:linear-gradient(135deg,#ffd700,#ffaa00)">AK</div>
            <div style="font-weight:700;font-size:1.0625rem;margin-bottom:var(--sp-1)">Alex K.</div>
            <div style="font-weight:800;color:#ffd700;font-size:1.125rem">15,200 XP</div>
        </div>
        <div class="card stat-card fade-in-up text-center" style="margin-top:var(--sp-12)">
            <div class="lb-rank lb-rank--3" style="width:44px;height:44px;margin:0 auto var(--sp-3);font-size:1.125rem">3</div>
            <div class="lb-avatar" style="width:44px;height:44px;margin:0 auto var(--sp-3);font-size:0.8125rem">MR</div>
            <div style="font-weight:600;margin-bottom:var(--sp-1)">Mike R.</div>
            <div style="font-weight:700;color:var(--primary-light)">11,800 XP</div>
        </div>
    </div>

    <div class="card fade-in-up card-static">
        <div class="card-header"><h2 class="card-title"><i data-lucide="list-ordered"></i> Full Rankings</h2><span class="badge badge-info">This Week</span></div>
        <div id="lb-list" style="margin-top:var(--sp-4)"></div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
    const mock=[{rank:1,name:'Alex K.',i:'AK',xp:15200,lg:'diamond',z:'promotion'},{rank:2,name:'Sarah K.',i:'SK',xp:12400,lg:'diamond',z:'promotion'},{rank:3,name:'Mike R.',i:'MR',xp:11800,lg:'gold',z:'promotion'},{rank:4,name:'Emily C.',i:'EC',xp:9600,lg:'gold',z:'safe'},{rank:5,name:'You',i:'YO',xp:8200,lg:'silver',z:'safe',me:true},{rank:6,name:'David L.',i:'DL',xp:7400,lg:'silver',z:'safe'},{rank:7,name:'Lisa W.',i:'LW',xp:6100,lg:'silver',z:'safe'},{rank:8,name:'James B.',i:'JB',xp:4800,lg:'bronze',z:'demotion'},{rank:9,name:'Anna P.',i:'AP',xp:3200,lg:'bronze',z:'demotion'},{rank:10,name:'Chris M.',i:'CM',xp:2100,lg:'bronze',z:'demotion'}];
    function render(){const c=document.getElementById('lb-list');const u=JSON.parse(localStorage.getItem('user')||'{}');const me=mock.find(e=>e.me);if(me&&u.name){me.name=u.name;me.i=u.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)}
    const ln={diamond:'💎 Diamond',gold:'🥇 Gold',silver:'🥈 Silver',bronze:'🥉 Bronze'};const lc={diamond:'league-diamond',gold:'league-gold',silver:'league-silver',bronze:'league-bronze'};
    c.innerHTML=mock.map((e,idx)=>{const rc=e.rank<=3?`lb-rank--${e.rank}`:'lb-rank--default';return`<div class="lb-row zone-${e.z} ${e.me?'current-user':''} fade-in-up" style="animation-delay:${idx*50}ms"><div class="lb-rank ${rc}">${e.rank}</div><div class="lb-user"><div class="lb-avatar">${e.i}</div><div><div class="lb-name">${e.name} ${e.me?'<span class="badge badge-primary" style="margin-left:var(--sp-2)">You</span>':''}</div></div></div><span class="lb-league ${lc[e.lg]}">${ln[e.lg]}</span><div class="lb-xp">${e.xp.toLocaleString()} XP</div></div>`}).join('')}
    document.addEventListener('DOMContentLoaded',()=>setTimeout(render,100));
    </script>
</body>
</html>
