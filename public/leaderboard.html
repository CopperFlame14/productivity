<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard — ProQuest</title>
    <meta name="description" content="See how you rank against other users.">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <!-- App shell injected by app.js -->

    <div class="page-header">
        <h1>🏆 Leaderboard</h1>
        <p>Compete with others and climb the ranks. Top performers earn league promotions!</p>
    </div>

    <!-- League Info -->
    <div class="card mb-4 card-static fade-in-up">
        <div class="d-flex justify-between align-center">
            <div>
                <div class="overline">Your League</div>
                <div class="d-flex align-center gap-2 mt-1">
                    <span class="leaderboard-league league-silver">🥈 Silver League</span>
                </div>
            </div>
            <div class="text-right">
                <div class="overline">Your Rank</div>
                <div style="font-size: 2rem; font-weight: 800; color: var(--primary-light); margin-top: var(--sp-1);">#5</div>
            </div>
        </div>
    </div>

    <!-- Top 3 Podium -->
    <div class="grid grid-3 mb-4 stagger">
        <!-- 2nd Place -->
        <div class="card stat-card fade-in-up text-center" style="margin-top: var(--sp-8);">
            <div class="leaderboard-rank leaderboard-rank--2" style="width: 48px; height: 48px; margin: 0 auto var(--sp-3); font-size: 1.25rem;">2</div>
            <div class="leaderboard-avatar" style="width: 48px; height: 48px; margin: 0 auto var(--sp-3); font-size: 1rem;">SK</div>
            <div style="font-weight: 600; color: var(--text-primary); margin-bottom: var(--sp-1);">Sarah K.</div>
            <div style="font-weight: 700; color: var(--primary-light);">12,400 XP</div>
        </div>

        <!-- 1st Place -->
        <div class="card stat-card fade-in-up text-center" style="border-color: rgba(255, 215, 0, 0.3);">
            <div style="font-size: 2rem; margin-bottom: var(--sp-2);">👑</div>
            <div class="leaderboard-rank leaderboard-rank--1" style="width: 56px; height: 56px; margin: 0 auto var(--sp-3); font-size: 1.5rem;">1</div>
            <div class="leaderboard-avatar" style="width: 56px; height: 56px; margin: 0 auto var(--sp-3); font-size: 1.125rem; background: linear-gradient(135deg, #ffd700, #ffaa00);">AK</div>
            <div style="font-weight: 700; color: var(--text-primary); font-size: 1.0625rem; margin-bottom: var(--sp-1);">Alex K.</div>
            <div style="font-weight: 800; color: #ffd700; font-size: 1.125rem;">15,200 XP</div>
        </div>

        <!-- 3rd Place -->
        <div class="card stat-card fade-in-up text-center" style="margin-top: var(--sp-12);">
            <div class="leaderboard-rank leaderboard-rank--3" style="width: 44px; height: 44px; margin: 0 auto var(--sp-3); font-size: 1.125rem;">3</div>
            <div class="leaderboard-avatar" style="width: 44px; height: 44px; margin: 0 auto var(--sp-3); font-size: 0.875rem;">MR</div>
            <div style="font-weight: 600; color: var(--text-primary); margin-bottom: var(--sp-1);">Mike R.</div>
            <div style="font-weight: 700; color: var(--primary-light);">11,800 XP</div>
        </div>
    </div>

    <!-- Full Rankings -->
    <div class="card fade-in-up card-static">
        <div class="card-header">
            <h2 class="card-title" style="margin:0;">Full Rankings</h2>
            <span class="badge badge-info">This Week</span>
        </div>

        <div id="leaderboard-list" style="margin-top: var(--sp-4);"></div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Mock leaderboard data
        const mockLeaderboard = [
            { rank: 1, name: 'Alex K.', initials: 'AK', xp: 15200, league: 'diamond', zone: 'promotion' },
            { rank: 2, name: 'Sarah K.', initials: 'SK', xp: 12400, league: 'diamond', zone: 'promotion' },
            { rank: 3, name: 'Mike R.', initials: 'MR', xp: 11800, league: 'gold', zone: 'promotion' },
            { rank: 4, name: 'Emily C.', initials: 'EC', xp: 9600, league: 'gold', zone: 'safe' },
            { rank: 5, name: 'You', initials: 'YO', xp: 8200, league: 'silver', zone: 'safe', isCurrentUser: true },
            { rank: 6, name: 'David L.', initials: 'DL', xp: 7400, league: 'silver', zone: 'safe' },
            { rank: 7, name: 'Lisa W.', initials: 'LW', xp: 6100, league: 'silver', zone: 'safe' },
            { rank: 8, name: 'James B.', initials: 'JB', xp: 4800, league: 'bronze', zone: 'demotion' },
            { rank: 9, name: 'Anna P.', initials: 'AP', xp: 3200, league: 'bronze', zone: 'demotion' },
            { rank: 10, name: 'Chris M.', initials: 'CM', xp: 2100, league: 'bronze', zone: 'demotion' },
        ];

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-list');

            // Try to use real user name
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.name) {
                const currentEntry = mockLeaderboard.find(e => e.isCurrentUser);
                if (currentEntry) {
                    currentEntry.name = user.name;
                    currentEntry.initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
                }
            }

            container.innerHTML = mockLeaderboard.map((entry, i) => {
                const rankClass = entry.rank <= 3 ? `leaderboard-rank--${entry.rank}` : 'leaderboard-rank--default';
                const leagueMap = {
                    diamond: 'league-diamond',
                    gold: 'league-gold',
                    silver: 'league-silver',
                    bronze: 'league-bronze'
                };
                const leagueNames = {
                    diamond: '💎 Diamond',
                    gold: '🥇 Gold',
                    silver: '🥈 Silver',
                    bronze: '🥉 Bronze'
                };

                return `
                    <div class="leaderboard-row zone-${entry.zone} ${entry.isCurrentUser ? 'current-user' : ''} fade-in-up" style="animation-delay: ${i * 50}ms">
                        <div class="leaderboard-rank ${rankClass}">${entry.rank}</div>
                        <div class="leaderboard-user">
                            <div class="leaderboard-avatar">${entry.initials}</div>
                            <div>
                                <div class="leaderboard-name">${entry.name} ${entry.isCurrentUser ? '<span class="badge badge-primary" style="margin-left: var(--sp-2);">You</span>' : ''}</div>
                            </div>
                        </div>
                        <span class="leaderboard-league ${leagueMap[entry.league]}">${leagueNames[entry.league]}</span>
                        <div class="leaderboard-xp">${entry.xp.toLocaleString()} XP</div>
                    </div>
                `;
            }).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Small delay to ensure app shell is initialized
            setTimeout(renderLeaderboard, 100);
        });
    </script>
</body>

</html>
