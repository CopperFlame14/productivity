<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ProQuest</title>
    <meta name="description" content="Start your gamified productivity journey.">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card card card-static">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i data-lucide="zap"></i></div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start your productivity quest today</p>
            </div>
            <div id="error-container"></div>
            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" required placeholder="Your Name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="Min. 6 characters">
                    <span class="form-hint">Must be at least 6 characters</span>
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i data-lucide="user-plus" style="width:18px;height:18px"></i> Create Account
                </button>
            </form>
            <div class="auth-footer">Already have an account? <a href="/">Sign in</a></div>
        </div>
    </div>
    <script>if(window.lucide) lucide.createIcons();</script>
    <script src="/js/auth.js"></script>
</body>
</html>
