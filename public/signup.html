<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Gamified Productivity Tracker</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .signup-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .signup-card {
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 3rem;
        }

        .error-message {
            background: rgba(248, 113, 113, 0.2);
            border: 1px solid var(--color-error);
            color: var(--color-error);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <div class="signup-card card">
            <div class="logo">🎮</div>
            <h1 class="text-center">Create Account</h1>
            <p class="text-center text-muted mb-3">Start your productivity journey</p>

            <div id="error-container"></div>

            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label" for="name">Name</label>
                    <input type="text" id="name" class="form-input" required placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-input" required placeholder="your@email.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="Min. 6 characters">
                    <small class="text-muted">Minimum 6 characters</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <p class="text-center mt-3">
                Already have an account? <a href="/">Login</a>
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
