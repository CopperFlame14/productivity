<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements — ProQuest</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="page-header"><h1>Achievements</h1><p>Unlock badges by hitting milestones. Keep pushing to collect them all!</p></div>

    <div class="stats-grid stagger mb-4">
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-primary"><i data-lucide="award"></i></div><div class="stat-label">Unlocked</div><div class="stat-value stat-card--primary" id="unlocked-count">0</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-accent"><i data-lucide="lock"></i></div><div class="stat-label">Remaining</div><div class="stat-value stat-card--accent" id="locked-count">0</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-success"><i data-lucide="pie-chart"></i></div><div class="stat-label">Completion</div><div class="stat-value stat-card--success" id="completion-pct">0%</div></div>
    </div>

    <div id="ach-container"></div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
    const cats=[{cat:'Streak Mastery',icon:'flame',items:[{n:'First Flame',d:'1 day streak',u:true},{n:'Week Warrior',d:'7-day streak',u:true},{n:'Fortnight Force',d:'14-day streak',u:false},{n:'Month Master',d:'30-day streak',u:false},{n:'Untouchable',d:'100-day streak',u:false}]},{cat:'XP Milestones',icon:'star',items:[{n:'Starter',d:'Earn 100 XP',u:true},{n:'Rising Star',d:'Earn 500 XP',u:true},{n:'Shining Star',d:'Earn 1,000 XP',u:true},{n:'Supernova',d:'Earn 5,000 XP',u:false},{n:'Legendary',d:'Earn 10,000 XP',u:false}]},{cat:'Task Completion',icon:'check-circle',items:[{n:'First Step',d:'Complete 1 task',u:true},{n:'Productive',d:'Complete 10 tasks',u:true},{n:'Machine',d:'Complete 50 tasks',u:false},{n:'Task Master',d:'Complete 100 tasks',u:false},{n:'Perfectionist',d:'S-rank 10 days',u:false}]},{cat:'Learning',icon:'book-open',items:[{n:'Problem Solver',d:'Solve 1 LeetCode',u:true},{n:'Code Warrior',d:'Solve 10 LeetCode',u:false},{n:'Scholar',d:'Study 10 hours',u:false},{n:'Professor',d:'Study 50 hours',u:false}]}];
    function render(){const c=document.getElementById('ach-container');let tu=0,tt=0;
    c.innerHTML=cats.map((cat,ci)=>{const ul=cat.items.filter(i=>i.u).length;tu+=ul;tt+=cat.items.length;return`<div class="card mb-4 card-static fade-in-up" style="animation-delay:${ci*100}ms"><div class="card-header"><h2 class="card-title"><i data-lucide="${cat.icon}"></i> ${cat.cat}</h2><span class="badge badge-primary">${ul}/${cat.items.length}</span></div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:var(--sp-4);margin-top:var(--sp-5)">${cat.items.map((it,i)=>`<div class="ach-badge card fade-in-up" style="padding:var(--sp-5);animation-delay:${(ci*100)+(i*60)}ms"><div class="ach-icon ${it.u?'ach-icon--unlocked':'ach-icon--locked'}"><i data-lucide="${cat.icon}" style="width:28px;height:28px"></i></div><div class="ach-name">${it.n}</div><div class="ach-desc">${it.d}</div>${it.u?'<span class="badge badge-success mt-1" style="font-size:0.6875rem">Unlocked</span>':'<span class="badge badge-info mt-1" style="font-size:0.6875rem;opacity:0.4">Locked</span>'}</div>`).join('')}</div></div>`}).join('');
    document.getElementById('unlocked-count').textContent=tu;document.getElementById('locked-count').textContent=tt-tu;document.getElementById('completion-pct').textContent=Math.round((tu/tt)*100)+'%';if(window.lucide)lucide.createIcons()}
    document.addEventListener('DOMContentLoaded',()=>setTimeout(render,100));
    </script>
</body>
</html>
