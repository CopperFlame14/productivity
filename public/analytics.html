<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — ProQuest</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="page-header"><h1>Analytics</h1><p>Track your productivity trends and performance over time.</p></div>

    <div class="stats-grid stagger mb-4">
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-primary"><i data-lucide="bar-chart-3"></i></div><div class="stat-label">Avg Score (7d)</div><div class="stat-value stat-card--primary" id="avg-score">--</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-warning"><i data-lucide="flame"></i></div><div class="stat-label">Current Streak</div><div class="stat-value stat-card--warning" id="streak">--</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-success"><i data-lucide="trophy"></i></div><div class="stat-label">Best Streak</div><div class="stat-value stat-card--success" id="best-streak">--</div></div>
    </div>

    <div class="grid grid-2 mb-4">
        <div class="card fade-in-up card-static">
            <div class="card-header"><h3 class="card-title"><i data-lucide="crown"></i> Best Day</h3></div>
            <div style="margin-top:var(--sp-4)"><div class="overline mb-1">Date</div><p id="best-day" class="text-success" style="font-size:1.125rem;font-weight:600">--</p><div class="overline mb-1 mt-3">Score</div><p id="best-score" style="font-size:1.125rem;font-weight:600">--</p></div>
        </div>
        <div class="card fade-in-up card-static">
            <div class="card-header"><h3 class="card-title"><i data-lucide="trending-up"></i> Trend</h3></div>
            <div style="margin-top:var(--sp-4)"><div class="overline mb-1">Direction</div><p id="trend-indicator" style="font-size:1.125rem;font-weight:700">--</p><div class="overline mb-1 mt-3">Analysis</div><p id="trend-description" class="text-muted">--</p></div>
        </div>
    </div>

    <div class="card fade-in-up card-static">
        <div class="card-header"><h2 class="card-title"><i data-lucide="calendar-days"></i> Recent Activity</h2><span class="badge badge-info">Last 7 days</span></div>
        <div id="history-container" style="margin-top:var(--sp-4)"><div class="loading-overlay"><div class="spinner"></div><span class="loading-text">Loading analytics...</span></div></div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
    const API_BASE=window.location.hostname==='localhost'?'http://localhost:3000/api':'/api';
    async function loadAnalytics(){try{const t=localStorage.getItem('token');const[pR,sR,hR]=await Promise.all([fetch(`${API_BASE}/analytics/productivity?days=7`,{headers:{'Authorization':`Bearer ${t}`}}),fetch(`${API_BASE}/analytics/streak`,{headers:{'Authorization':`Bearer ${t}`}}),fetch(`${API_BASE}/daily/history?days=7`,{headers:{'Authorization':`Bearer ${t}`}})]);
    if(pR.ok){const d=await pR.json();displayProductivity(d)}if(sR.ok){const s=await sR.json();document.getElementById('streak').textContent=s.currentStreak;document.getElementById('best-streak').textContent=s.bestStreak}if(hR.ok){displayHistory(await hR.json())}}catch(e){console.error(e)}}

    function displayProductivity(d){if(!d.stats)return;const{stats}=d;document.getElementById('avg-score').textContent=stats.averageScore.toFixed(1);
    if(stats.bestDay){const dt=new Date(stats.bestDay.date);document.getElementById('best-day').textContent=dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});document.getElementById('best-score').innerHTML=`<span style="font-size:1.5rem;font-weight:800">${stats.bestDay.score.toFixed(1)}</span> <span class="badge badge-primary ml-2">${stats.bestDay.rank}</span>`}
    const tEl=document.getElementById('trend-indicator'),tD=document.getElementById('trend-description');if(stats.trend==='up'){tEl.textContent='↗ Improving';tEl.style.color='var(--success-light)';tD.textContent='Your productivity is on the rise!'}else if(stats.trend==='down'){tEl.textContent='↘ Declining';tEl.style.color='var(--danger-light)';tD.textContent='Focus on consistency to bounce back.'}else{tEl.textContent='→ Stable';tEl.style.color='var(--info-light)';tD.textContent='Steady performance. Keep it up!'}}

    function displayHistory(recs){const c=document.getElementById('history-container');if(!recs.length){c.innerHTML='<div class="empty-state"><div class="empty-state-icon"><i data-lucide="calendar-x" style="width:48px;height:48px;color:var(--text-muted)"></i></div><div class="empty-state-title">No activity</div><div class="empty-state-desc">Start completing tasks to see history.</div></div>';if(window.lucide)lucide.createIcons();return}
    const mx=Math.max(...recs.map(r=>r.scores?.finalScore||0),1);
    c.innerHTML=`<div style="display:flex;align-items:flex-end;gap:var(--sp-2);height:120px;margin-bottom:var(--sp-6);padding:0 var(--sp-2)">${recs.map((r,i)=>{const s=r.scores?.finalScore||0;const h=Math.max(8,(s/mx)*100);const d=new Date(r.date).toLocaleDateString('en-US',{weekday:'short'});return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:var(--sp-1)"><span class="caption" style="font-size:0.6875rem">${s.toFixed(0)}</span><div style="width:100%;height:${h}%;background:var(--gradient-primary);border-radius:var(--radius-sm);animation:fadeInUp 0.4s var(--ease-out) ${i*80}ms both;min-height:4px;box-shadow:0 0 10px var(--primary-glow)"></div><span class="caption" style="font-size:0.6875rem">${d}</span></div>`}).join('')}</div><div class="divider"></div>${recs.map((r,i)=>{const d=new Date(r.date),s=r.scores?.finalScore||0,rk=r.scores?.rank||'C';return`<div class="history-item fade-in-up" style="animation-delay:${i*60}ms"><div class="d-flex align-center gap-3"><span style="font-weight:600;color:var(--text-primary)">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span><span class="caption">${d.toLocaleDateString('en-US',{weekday:'long'})}</span></div><div class="d-flex align-center gap-3"><span class="badge badge-primary">${rk}</span><span style="font-weight:700;color:var(--text-primary)">${s.toFixed(1)}</span></div></div>`}).join('')}`;if(window.lucide)lucide.createIcons()}
    loadAnalytics();
    </script>
</body>
</html>
