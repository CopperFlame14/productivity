<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — ProQuest</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="page-header"><h1>Profile</h1><p>Your account overview and statistics.</p></div>

    <div class="card mb-4 card-static fade-in-up">
        <div class="d-flex align-center gap-4 flex-wrap">
            <div class="sidebar-avatar" id="profile-avatar" style="width:72px;height:72px;font-size:1.5rem">U</div>
            <div class="flex-1">
                <h2 id="profile-name" style="margin-bottom:var(--sp-1)">User</h2>
                <p class="caption" id="profile-email">user@example.com</p>
                <p class="caption" id="profile-joined">Joined: --</p>
            </div>
            <div class="level-badge" id="profile-level" style="font-size:1rem;padding:var(--sp-2) var(--sp-4)"><i data-lucide="star" style="width:16px;height:16px"></i> <span>Level 1</span></div>
        </div>
    </div>

    <div class="stats-grid stagger mb-4">
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-accent"><i data-lucide="sparkles"></i></div><div class="stat-label">Total XP</div><div class="stat-value stat-card--accent" id="profile-xp">0</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-warning"><i data-lucide="flame"></i></div><div class="stat-label">Current Streak</div><div class="stat-value stat-card--warning" id="profile-streak">0</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-success"><i data-lucide="trophy"></i></div><div class="stat-label">Best Streak</div><div class="stat-value stat-card--success" id="profile-best-streak">0</div></div>
        <div class="card stat-card fade-in-up"><div class="stat-icon icon-primary"><i data-lucide="tv"></i></div><div class="stat-label">Episodes</div><div class="stat-value stat-card--primary" id="profile-anime">0</div></div>
    </div>

    <div class="card mb-4 card-static fade-in-up">
        <div class="card-header"><h3 class="card-title"><i data-lucide="trending-up"></i> Level Progress</h3></div>
        <div class="xp-bar-container mt-3">
            <div class="xp-bar-header"><span class="xp-bar-label">Next Level</span><span class="xp-bar-value" id="profile-xp-progress">0 / 500 XP</span></div>
            <div class="xp-bar-track"><div class="xp-bar-fill" id="profile-xp-fill" style="width:0%"></div></div>
        </div>
    </div>

    <div class="card card-static fade-in-up">
        <div class="card-header"><h3 class="card-title"><i data-lucide="settings"></i> Account</h3></div>
        <div class="mt-3"><button class="btn btn-danger" onclick="if(confirm('Sign out?'))logout()"><i data-lucide="log-out" style="width:16px;height:16px"></i> Sign Out</button></div>
    </div>

    <script src="/js/app.js"></script>
    <script src="/js/auth.js"></script>
    <script>
    const API_BASE=window.location.hostname==='localhost'?'http://localhost:3000/api':'/api';
    async function loadProfile(){const u=JSON.parse(localStorage.getItem('user')||'{}');document.getElementById('profile-name').textContent=u.name||'User';document.getElementById('profile-email').textContent=u.email||'';document.getElementById('profile-avatar').textContent=(u.name||'U').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    try{const r=await fetch(`${API_BASE}/user`,{headers:{'Authorization':`Bearer ${localStorage.getItem('token')}`}});if(r.ok){const d=await r.json(),s=d.stats||{};document.getElementById('profile-xp').textContent=s.totalXP||0;document.getElementById('profile-streak').textContent=s.currentStreak||0;document.getElementById('profile-best-streak').textContent=s.bestStreak||0;document.getElementById('profile-anime').textContent=s.animeEpisodesUnlocked||0;
    const lv=s.level||1;document.getElementById('profile-level').innerHTML=`<i data-lucide="star" style="width:16px;height:16px"></i> Level ${lv}`;const xpIn=(s.totalXP||0)%500,pct=(xpIn/500)*100;document.getElementById('profile-xp-progress').textContent=`${xpIn} / 500 XP`;document.getElementById('profile-xp-fill').style.width=`${pct}%`;if(d.createdAt){document.getElementById('profile-joined').textContent=`Joined ${new Date(d.createdAt).toLocaleDateString('en-US',{month:'long',year:'numeric'})}`}if(typeof animateNumber==='function'){animateNumber(document.getElementById('profile-xp'),s.totalXP||0);animateNumber(document.getElementById('profile-streak'),s.currentStreak||0)}if(window.lucide)lucide.createIcons()}}catch(e){console.error(e)}}
    loadProfile();
    </script>
</body>
</html>
