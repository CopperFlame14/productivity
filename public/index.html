<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ProQuest | Gamified Productivity</title>
    <meta name="description" content="Level up your productivity with gamification. Track tasks, earn XP, unlock rewards.">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>
    <div class="auth-page">
        <div class="auth-card card">
            <div class="auth-brand">
                <div class="auth-brand-icon">⚡</div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to continue your productivity journey</p>
            </div>

            <div id="error-container"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary btn-lg btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="/signup.html">Create one</a>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>

</html>
