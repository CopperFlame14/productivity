<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ProQuest</title>
    <meta name="description" content="Level up your productivity with gamification.">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card card card-static">
            <div class="auth-brand">
                <div class="auth-brand-icon"><i data-lucide="zap"></i></div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to continue your productivity quest</p>
            </div>
            <div id="error-container"></div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-lg btn-block">
                    <i data-lucide="log-in" style="width:18px;height:18px"></i> Sign In
                </button>
            </form>
            <div class="auth-footer">Don't have an account? <a href="/signup.html">Create one</a></div>
        </div>
    </div>
    <script>if(window.lucide) lucide.createIcons();</script>
    <script src="/js/auth.js"></script>
</body>
</html>
